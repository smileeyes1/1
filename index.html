<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المعلم الذكي – الجمع الآمن</title>

<style>
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;
  font-family:"Tajawal",Arial;
}
body{
  background:linear-gradient(#e8f7f5,#ffffff);
  display:flex;align-items:center;justify-content:center;
  color:#00695c;
}
.fullbtn{
  position:fixed;top:10px;right:10px;z-index:999;
  padding:8px 14px;border-radius:10px;
  background:#26a69a;color:white;border:none;
}
.container{width:100vw;height:100vh;padding:3vh 3vw}
.card{
  width:100%;height:100%;background:white;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
}
.character{display:flex;align-items:center;gap:10px}
.avatar{font-size:46px}
.name{font-size:22px;font-weight:bold}

.speech{
  background:#e0f2f1;border-radius:16px;
  padding:14px 18px 14px 46px;
  margin:12px 0;max-width:760px;text-align:center;
  position:relative;font-size:18px;
}
.voice{position:absolute;left:10px;top:10px;
  width:30px;height:30px;border-radius:50%;
  border:none;background:#26a69a;color:white
}

.question{font-size:36px;font-weight:bold;margin:10px 0}

.hearts{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:6px 0}
.heart{font-size:34px;animation:glow 1.4s infinite alternate}
@keyframes glow{from{transform:scale(1);opacity:.7}to{transform:scale(1.25);opacity:1}}

input{
  font-size:26px;width:100px;text-align:center;
  border-radius:12px;border:3px solid #80cbc4;padding:8px
}
button{
  margin:8px;padding:10px 22px;font-size:18px;
  border:none;border-radius:14px;background:#26a69a;color:white
}
.helper{
  background:#fff3cd;color:#795548;
  border-radius:12px;padding:10px;font-size:16px;margin-top:8px
}
@media(max-width:600px){
  .question{font-size:28px}.heart{font-size:28px}.name{font-size:18px}
}
</style>
</head>

<body>

<button class="fullbtn" onclick="toggleFull()">⛶ تصغير / تكبير</button>

<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character"><div class="avatar">🧔🏻‍♂️</div><div class="name">الحكيم إبراهيم</div></div>
  <div class="speech" id="introText">
    مرحبًا يا بطل. هنا نتعلّم بهدوء.
    لا يوجد توبيخ، فكل محاولة عبادة، والله مع الصابرين.
  </div>
  <button class="voice" onclick="speak(introText.innerText)">🔊</button>

  <p>اسم الطالب:</p><input id="student">
  <p>اسم ولي الأمر:</p><input id="parent">
  <button onclick="start()">ابدأ</button>
</div>

<!-- الدرس -->
<div id="lesson" class="card" style="display:none">
  <div class="character"><div class="avatar">👨‍🏫</div><div class="name">المعلّم محمد</div></div>

  <div class="speech" id="teacher"></div>
  <button class="voice" onclick="speak(teacher.innerText)">🔊</button>

  <div class="question" id="question"></div>
  <div id="hA" class="hearts"></div>
  <div style="font-size:26px;font-weight:bold">+</div>
  <div id="hB" class="hearts"></div>
  <div id="hR" class="hearts"></div>

  <input id="answer" type="number" placeholder="الناتج">

  <div>
    <button onclick="check()">تحقق</button>
    <button onclick="help()">🤍 أنا محتار</button>
  </div>

  <div id="helper" class="helper" style="display:none"></div>
  <div id="nextBox" style="display:none">
    <button id="nextBtn" disabled onclick="nextQ()">التالي (١٠)</button>
  </div>
</div>
</div>

<script>
/* ===== حالة الطفل (الذكاء الحقيقي) ===== */
const state={
  wrong:0, hesitation:0, help:0, success:0, lastTime:0
};

/* ===== أدوات ===== */
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  const v=speechSynthesis.getVoices().find(x=>x.lang.startsWith("ar"));
  if(v)u.voice=v;u.lang="ar-SA";u.rate=0.88;u.pitch=1.1;
  speechSynthesis.speak(u);
}
function eastern(n){return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);}
function hearts(id,n){
  const e=document.getElementById(id);e.innerHTML="";
  for(let i=0;i<n;i++){const h=document.createElement("span");h.className="heart";h.innerText="❤";e.appendChild(h)}
}
function toggleFull(){
  if(!document.fullscreenElement){document.documentElement.requestFullscreen()}
  else{document.exitFullscreen()}
}

/* ===== منطق الذكاء ===== */
function decideMode(){
  if(state.help>=2) return "support";
  if(state.wrong>=2) return "simplify";
  if(state.success>=3) return "challenge";
  return "normal";
}

/* ===== الدرس ===== */
let a=0,b=0,timer=null,sec=10,startTime=0,name="";
function start(){
  name=student.value||"بطلنا";
  intro.style.display="none";lesson.style.display="flex";
  newQ();
}
function newQ(){
  const mode=decideMode();
  state.lastTime=Date.now();

  if(mode==="simplify"){a=1;b=1}
  else if(mode==="challenge"){a=5+Math.floor(Math.random()*3);b=3}
  else{a=1+Math.floor(Math.random()*4);b=1+Math.floor(Math.random()*3)}

  teacher.innerText=`يا ${name}، سنعدّ القلوب معًا بهدوء. لا تعجل.`;
  speak(teacher.innerText);

  question.innerText=`${eastern(a)} + ${eastern(b)}`;
  hearts("hA",a);hearts("hB",b);hearts("hR",0);
  answer.value="";helper.style.display="none";nextBox.style.display="none";
  startTime=Date.now();
}

function check(){
  const t=(Date.now()-startTime)/1000;
  if(t>6) state.hesitation++;

  if(Number(answer.value)==a+b){
    state.success++;state.wrong=0;
    hearts("hR",a+b);
    teacher.innerText=`أحسنت يا ${name}. تفكيرك جميل، والنبي ﷺ يحب القوي الأمين.`;
    speak(teacher.innerText);startTimer();
  }else{
    state.wrong++;state.success=0;
    speak(`لا بأس يا ${name}. الخطأ طريق للتعلم، والله معك.`);
  }
}

function help(){
  state.help++;
  helper.style.display="block";
  helper.innerText="خذ نفسًا عميقًا، وعدّ القلوب واحدة واحدة.";
  speak(helper.innerText);
}

function startTimer(){
  sec=10;nextBox.style.display="block";nextBtn.disabled=true;
  nextBtn.innerText=`التالي (${sec})`;
  timer=setInterval(()=>{
    sec--;nextBtn.innerText=`التالي (${sec})`;
    if(sec<=0){clearInterval(timer);nextBtn.disabled=false;nextBtn.innerText="التالي"}
  },1000);
}
function nextQ(){newQ()}
</script>
</body>
</html>
