<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغامرة الجمع السحرية</title>

<style>
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;
  font-family:"Tajawal",Arial;
}
body{
  background:linear-gradient(#fde4ec,#ffffff);
  display:flex;justify-content:center;align-items:center;
  color:#880e4f;
}

.container{width:100vw;height:100vh;padding:3vh 3vw}
.card{
  width:100%;height:100%;
  background:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

/* الشخصيات */
.character{
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar{font-size:48px}
.name{font-size:22px;font-weight:bold}

/* الحوار */
.speech{
  background:#fce4ec;
  border-radius:16px;
  padding:16px 22px;
  margin:12px;
  max-width:900px;
  text-align:center;
  font-size:18px;
  line-height:1.7;
}

/* السؤال */
.question{
  font-size:36px;
  font-weight:bold;
  margin:10px 0;
}

/* القلوب */
.hearts{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
.heart{
  font-size:36px;
  color:#e53935;
  animation:glow 1.4s infinite alternate;
}
@keyframes glow{
  from{transform:scale(1);opacity:.7}
  to{transform:scale(1.25);opacity:1}
}

/* النجوم */
.stars{
  font-size:32px;
  color:#fbc02d;
  margin-top:10px;
  animation:twinkle 1.2s infinite alternate;
}
@keyframes twinkle{
  from{opacity:.5}
  to{opacity:1}
}

/* الإدخال والأزرار */
input{
  font-size:26px;
  width:120px;
  text-align:center;
  padding:8px;
  border-radius:12px;
  border:3px solid #f48fb1;
}
button{
  margin:6px;
  padding:12px 24px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#d81b60;
  color:white;
  cursor:pointer;
}

/* المساعدة */
.helper{
  background:#fff3cd;
  color:#795548;
  border-radius:12px;
  padding:14px;
  font-size:16px;
  margin-top:10px;
  max-width:900px;
  text-align:center;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<!-- الشخصية -->
<div class="character" id="currentChar">
  <div class="avatar" id="avatar">🧔🏻‍♂️</div>
  <div class="name" id="name">الحكيم إبراهيم</div>
</div>

<!-- النص -->
<div class="speech" id="speech">
مرحبًا يا بطل 🌟  
نحن هنا لنتعلم بهدوء ومحبة.  
كل محاولة منك عبادة جميلة.
</div>

<!-- السؤال -->
<div class="question" id="question">؟</div>

<!-- القلوب -->
<div id="heartsA" class="hearts"></div>
<div style="font-size:28px;font-weight:bold">+</div>
<div id="heartsB" class="hearts"></div>
<div id="heartsResult" class="hearts"></div>

<!-- الإدخال -->
<input id="answer" type="number" placeholder="الناتج">

<!-- الأزرار -->
<div>
  <button onclick="checkAnswer()">تحقق</button>
  <button onclick="needHelp()">🤍 أنا محتار</button>
  <button onclick="askHakim()">🧔🏻‍♂️ اسأل الحكيم</button>
</div>

<!-- رسائل -->
<div id="helper" class="helper" style="display:none"></div>
<div id="stars" class="stars" style="display:none">🌟 🌟 🌟</div>

</div>
</div>

<script>
/* ===============================
   الصوت الذكي (محلي – أسهل حل)
=============================== */
function speak(text, role="teacher"){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const voices = speechSynthesis.getVoices();

  let voice =
    voices.find(v => v.lang.startsWith("ar") && v.name.toLowerCase().includes("google")) ||
    voices.find(v => v.lang.startsWith("ar")) ||
    voices[0];

  u.voice = voice;
  u.lang = "ar-SA";

  if(role==="hakim"){ u.rate=0.85; u.pitch=0.9; }
  else{ u.rate=0.95; u.pitch=1.1; }

  speechSynthesis.speak(u);
}

/* ===============================
   أرقام وقيم
=============================== */
let a = Math.floor(Math.random()*5)+1;
let b = Math.floor(Math.random()*5)+1;
let success = 0;

/* ===============================
   عرض القلوب
=============================== */
function showHearts(id,n){
  const el=document.getElementById(id);
  el.innerHTML="";
  for(let i=0;i<n;i++){
    const h=document.createElement("span");
    h.className="heart";
    h.textContent="❤";
    el.appendChild(h);
  }
}

/* ===============================
   سؤال جديد
=============================== */
function newQuestion(){
  document.getElementById("avatar").textContent="👨‍🏫";
  document.getElementById("name").textContent="المعلم محمد";
  document.getElementById("helper").style.display="none";
  document.getElementById("stars").style.display="none";

  a=Math.floor(Math.random()*5)+1;
  b=Math.floor(Math.random()*5)+1;

  showHearts("heartsA",a);
  showHearts("heartsB",b);
  showHearts("heartsResult",0);

  const text="يا بطل، عدّ القلوب معي بهدوء ثم أخبرني بالناتج.";
  document.getElementById("speech").textContent=text;
  speak(text,"teacher");

  document.getElementById("question").textContent=`${a} + ${b} = ؟`;
  document.getElementById("answer").value="";
}

/* ===============================
   التحقق
=============================== */
function checkAnswer(){
  const user=Number(document.getElementById("answer").value);
  if(user===a+b){
    success++;
    showHearts("heartsResult",a+b);
    document.getElementById("stars").style.display="block";
    const msg="أحسنت يا بطل 🌟 تفكيرك جميل.";
    speak(msg,"teacher");
    setTimeout(newQuestion,2000);
  }else{
    speak("لا بأس، خذ وقتك وحاول بهدوء.","teacher");
  }
}

/* ===============================
   محتار
=============================== */
function needHelp(){
  const text="لا تقلق، عدّ القلوب واحدة واحدة، وستفهم.";
  document.getElementById("helper").style.display="block";
  document.getElementById("helper").textContent=text;
  speak(text,"teacher");
}

/* ===============================
   الحكيم إبراهيم
=============================== */
function askHakim(){
  document.getElementById("avatar").textContent="🧔🏻‍♂️";
  document.getElementById("name").textContent="الحكيم إبراهيم";
  const text="يا بني، الصبر مفتاح الفهم. نحن نجمع الأشياء عندما نضمها معًا.";
  document.getElementById("helper").style.display="block";
  document.getElementById("helper").textContent=text;
  speak(text,"hakim");
}

/* بداية */
newQuestion();
</script>

</body>
</html>
