<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درس الجمع – التعلّم عبادة</title>

<style>
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  margin:0;
  font-family:"Tajawal",Arial;
  background:linear-gradient(#e8f5e9,#ffffff);
  color:#1b5e20;
}
.container{
  max-width:480px;
  margin:auto;
  padding:12px;
}
.card{
  background:white;
  border-radius:18px;
  padding:16px;
  margin-top:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
.character{
  display:flex;
  align-items:center;
  gap:8px;
}
.avatar{font-size:42px}
.name{font-weight:bold}

.speech{
  background:#e0f2f1;
  border-radius:14px;
  padding:14px;
  margin-top:10px;
  line-height:1.6;
}

.question{
  font-size:30px;
  margin:16px 0;
  text-align:center;
}

.hearts{
  display:flex;
  justify-content:center;
  gap:6px;
  flex-wrap:wrap;
}
.heart{
  font-size:30px;
  color:#e53935;
}
.stars{
  font-size:28px;
  color:#fbc02d;
  text-align:center;
  display:none;
}

input{
  font-size:24px;
  width:100%;
  padding:6px;
  border-radius:10px;
  border:2px solid #a5d6a7;
  margin-bottom:8px;
  text-align:center;
}

button{
  margin-top:10px;
  padding:8px 16px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#43a047;
  color:white;
  cursor:pointer;
}

.fullscreen-btn{
  background:#1b5e20;
  font-size:16px;
}

.helper{
  background:#fff8e1;
  border-radius:12px;
  padding:12px;
  font-size:16px;
  margin-top:10px;
  display:none;
}
</style>
</head>

<body>
<div class="container">

<!-- زر ملء الشاشة -->
<button class="fullscreen-btn" onclick="toggleFullscreen()">
🖥️ ملء الشاشة
</button>

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>

  <div class="speech">
    مرحبًا يا بطل 🌱<br>
    اليوم سنتعلّم الجمع بهدوء ومحبة.<br>
    تذكّر دائمًا: <b>التعلّم عبادة</b>، والله مع الصابرين.
  </div>

  <p>اسم الطالب:</p>
  <input id="studentName" placeholder="اكتب اسمك">

  <p>اسم ولي الأمر:</p>
  <input id="parentName" placeholder="اسم الوالد أو الوالدة">

  <button onclick="startLesson()">ابدأ الدرس</button>
</div>

<!-- الدرس -->
<div id="lesson" class="card" style="display:none">

  <div class="character">
    <div class="avatar">👨‍🏫</div>
    <div class="name">المعلم محمد</div>
  </div>

  <div id="teacherText" class="speech"></div>

  <div id="questionText" class="question"></div>

  <div id="heartsA" class="hearts"></div>
  <div style="text-align:center;font-size:26px">+</div>
  <div id="heartsB" class="hearts"></div>
  <div id="heartsResult" class="hearts"></div>

  <input id="answerInput" type="number" placeholder="الناتج">

  <div>
    <button onclick="checkAnswer()">تحقّق</button>
    <button onclick="needHelp()">أنا محتار 🤍</button>
  </div>

  <div id="helper" class="helper"></div>

  <div id="stars" class="stars">🌟 🌟 🌟</div>

  <div id="nextArea" style="display:none">
    <button id="nextBtn" disabled onclick="nextStep()">التالي (١٠)</button>
  </div>
</div>

</div>

<script>
let student="", parent="";
let a=0,b=0,level=1;
let attempts=0,helps=0;
let time=10,timer=null;
let startTime=0;
let stepClicks=0;

function eastern(n){
  return n.toString().replace(/\d/g,d=>"٠١٢٣٤٥٦٧٨٩"[d]);
}

function speak(text){
  if(!("speechSynthesis"in window))return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA"; u.rate=0.95;
  speechSynthesis.speak(u);
}

function showHearts(id,n){
  const el=document.getElementById(id);
  el.innerHTML="";
  for(let i=0;i<n;i++){
    const s=document.createElement("span");
    s.className="heart";
    s.textContent="❤";
    el.appendChild(s);
  }
}

function startLesson(){
  student=studentName.value||"بطلنا";
  parent=parentName.value||"ولي أمره";
  intro.style.display="none";
  lesson.style.display="block";
  newQuestion();
}

function newQuestion(){
  attempts=0; helps=0; stepClicks=0;
  startTime=Date.now();

  a=Math.floor(Math.random()*(level+2))+1;
  b=Math.floor(Math.random()*(level+2))+1;

  teacherText.innerHTML=
    `يا ${student}، سنفهم أولًا ثم نجيب بهدوء.<br>
     الله معك، خذ وقتك.`;

  speak(teacherText.innerText);

  questionText.innerText=
    `${eastern(a)} + ${eastern(b)} = ؟`;

  showHearts("heartsA",a);
  showHearts("heartsB",b);
  showHearts("heartsResult",0);

  answerInput.value="";
  helper.style.display="none";
  stars.style.display="none";
  nextArea.style.display="none";
}

function checkAnswer(){
  attempts++;
  if(Number(answerInput.value)===a+b){
    showHearts("heartsResult",a+b);
    stars.style.display="block";
    teacherText.innerHTML=
      `أحسنت يا ${student} 🌟<br>
       محاولتك عبادة جميلة، والله يبارك جهدك.`;
    speak(teacherText.innerText);
    level=Math.min(level+1,6);
    startNextTimer();
  }else{
    teacherText.innerHTML=
      `لا بأس يا ${student}.<br>
       الخطأ طريق الفهم، والله مع الصابرين.`;
    speak(teacherText.innerText);
  }
}

function needHelp(){
  helps++;
  helper.style.display="block";
  helper.innerHTML=
    `تنفّس بهدوء يا ${student}.<br>
     عدّ القلوب واحدة واحدة.`;
  speak(helper.innerText);
}

function startNextTimer(){
  nextArea.style.display="block";
  time=10;
  nextBtn.disabled=true;
  nextBtn.innerText=`التالي (${eastern(time)})`;

  timer=setInterval(()=>{
    time--;
    nextBtn.innerText=`التالي (${eastern(time)})`;
    if(time<=0){
      clearInterval(timer);
      nextBtn.disabled=false;
      nextBtn.innerText="التالي";
    }
  },1000);
}

function nextStep(){
  stepClicks++;
  nextArea.style.display="none";
  newQuestion();
}

/* ملء الشاشة */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
    speak("نبدأ بهدوء، والله معك.");
  }else{
    document.exitFullscreen();
  }
}
</script>

</body>
</html>
