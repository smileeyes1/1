<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المعلم محمد الذكي – بصوت بشري</title>

<style>
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;
  font-family:"Tajawal",Arial;
}
body{
  background:linear-gradient(#fde4ec,#ffffff);
  display:flex;justify-content:center;align-items:center;
  color:#880e4f;
}

.container{width:100vw;height:100vh;padding:3vh 3vw}
.card{
  width:100%;height:100%;
  background:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.character{display:flex;align-items:center;gap:12px}
.avatar{font-size:48px}
.name{font-size:22px;font-weight:bold}

.speech{
  background:#fce4ec;
  border-radius:16px;
  padding:16px 20px;
  margin:12px;
  max-width:900px;
  text-align:center;
  font-size:18px;
}

input{
  font-size:22px;
  padding:8px;
  border-radius:12px;
  border:3px solid #f48fb1;
  width:260px;
  text-align:center;
}

button{
  margin:8px;
  padding:12px 24px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#d81b60;
  color:white;
  cursor:pointer;
}

audio{display:none}
</style>
</head>

<body>

<div class="container">
<div class="card">

<div class="character">
  <div class="avatar">👨‍🏫</div>
  <div class="name">المعلم محمد</div>
</div>

<div class="speech" id="teacherText">
  مرحبًا يا بطل، يمكنك أن تسألني أي سؤال في الدرس 🌟
</div>

<input id="childQuestion" placeholder="اكتب سؤالك هنا">

<div>
  <button onclick="askTeacher()">👨‍🏫 اسأل المعلم محمد</button>
  <button onclick="askHakim()">🧔🏻‍♂️ اسأل الحكيم إبراهيم</button>
</div>

<audio id="voicePlayer"></audio>

</div>
</div>

<script>
async function speakHuman(text, role){
  const res = await fetch("http://localhost:3000/api/speak", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      text: text,
      role: role
    })
  });

  const data = await res.json();

  document.getElementById("teacherText").innerText = data.text;

  const audio = document.getElementById("voicePlayer");
  audio.src = data.audioUrl;
  audio.play();
}

async function askTeacher(){
  const q = document.getElementById("childQuestion").value.trim();
  if(!q) return;

  speakHuman(q,"teacher");
}

async function askHakim(){
  const q = document.getElementById("childQuestion").value.trim();
  if(!q) return;

  speakHuman(q,"hakim");
}
</script>

</body>
</html>
