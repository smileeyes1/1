<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مغامرة الجمع الذكية – مع الحكيم إبراهيم</title>

<style>
*{box-sizing:border-box}
html,body{
  width:100%;height:100%;margin:0;overflow:hidden;
  font-family:"Tajawal",Arial;
}
body{
  background:linear-gradient(#e0f7fa,#ffffff);
  display:flex;justify-content:center;align-items:center;
  color:#00695c;
}
.container{width:100vw;height:100vh;padding:3vh 3vw}
.card{
  width:100%;height:100%;
  background:white;
  padding:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}
.character{display:flex;align-items:center;gap:10px}
.avatar{font-size:46px}
.name{font-size:22px;font-weight:bold}
.speech{
  background:#e0f2f1;border-radius:16px;
  padding:14px 18px;margin:10px;
  max-width:800px;text-align:center;
}
.question{font-size:34px;font-weight:bold}
.hearts{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.heart{font-size:32px}
input{
  font-size:26px;width:100px;text-align:center;
  padding:8px;border-radius:12px;
  border:3px solid #80cbc4;
}
button{
  margin:6px;padding:10px 20px;
  font-size:18px;border:none;border-radius:14px;
  background:#26a69a;color:white;cursor:pointer;
}
.helper{
  background:#fff3cd;color:#795548;
  border-radius:12px;padding:10px;font-size:16px;margin-top:6px;
}
.fullbtn{
  position:fixed;top:10px;right:10px;
  padding:8px 14px;border-radius:10px;
  background:#26a69a;color:white;border:none;z-index:999;
}
</style>
</head>
<body>

<button class="fullbtn" onclick="toggleFull()">⛶ تكبير / تصغير</button>

<div class="container">

<!-- المقدمة -->
<div id="intro" class="card">
  <div class="character">
    <div class="avatar">🧔🏻‍♂️</div>
    <div class="name">الحكيم إبراهيم</div>
  </div>
  <div class="speech">
    مرحبًا يا بطل 🌟  
    هنا نتعلّم بهدوء ومحبة.  
    لا أحد يُخطئ هنا… كل محاولة عبادة.
  </div>
  <p>اسم الطالب:</p>
  <input id="studentName">
  <button onclick="start()">ابدأ المغامرة</button>
</div>

<!-- الدرس -->
<div id="lesson" class="card" style="display:none">

  <div class="character">
    <div class="avatar">👨‍🏫</div>
    <div class="name">المعلّم محمد</div>
  </div>

  <div class="speech" id="teacherText"></div>

  <div class="question" id="question"></div>

  <div id="hA" class="hearts"></div>
  <div style="font-size:26px;font-weight:bold">+</div>
  <div id="hB" class="hearts"></div>
  <div id="hR" class="hearts"></div>

  <input id="answer" type="number" placeholder="الناتج">

  <div>
    <button onclick="check()">تحقّق</button>
    <button onclick="help()">🤍 أنا محتار</button>
    <button onclick="askHakim()">🧔🏻‍♂️ اسأل الحكيم</button>
  </div>

  <div id="helper" class="helper" style="display:none"></div>

</div>
</div>

<script>
/* ========= البيانات ========= */
let student="بطلنا";
let a=2, b=3;

/* ========= حالة الطفل (الذكاء) ========= */
const state={
  wrong:0,
  help:0,
  success:0
};

/* ========= أدوات ========= */
function toggleFull(){
  document.fullscreenElement?
    document.exitFullscreen():
    document.documentElement.requestFullscreen();
}
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="ar-SA";u.rate=0.9;u.pitch=1.1;
  speechSynthesis.speak(u);
}
function hearts(id,n){
  const el=document.getElementById(id);el.innerHTML="";
  for(let i=0;i<n;i++){
    const h=document.createElement("span");
    h.className="heart";h.innerText="❤";
    el.appendChild(h);
  }
}

/* ========= بدء ========= */
function start(){
  student=studentName.value||student;
  intro.style.display="none";
  lesson.style.display="flex";
  newQ();
  document.documentElement.requestFullscreen?.();
}

function newQ(){
  teacherText.innerText=
    `يا ${student}، انظر إلى القلوب وعدّها بهدوء.`;
  speak(teacherText.innerText);

  question.innerText=`كم ناتج ${a} + ${b} ؟`;
  hearts("hA",a);
  hearts("hB",b);
  hearts("hR",0);
  answer.value="";
  helper.style.display="none";
}

/* ========= التحقق ========= */
function check(){
  if(Number(answer.value)==a+b){
    state.success++;
    hearts("hR",a+b);
    speak(`أحسنت يا ${student}. الله يبارك فيك.`);
  }else{
    state.wrong++;
    speak(`لا بأس يا ${student}. خذ وقتك.`);
  }
}

/* ========= زر المحتار ========= */
function help(){
  state.help++;
  helper.style.display="block";
  helper.innerText="عدّ القلوب واحدة واحدة. لا تعجَل.";
  speak(helper.innerText);
}

/* ========= الحكيم إبراهيم (ذكاء اصطناعي مقيّد) ========= */
function askHakim(){
  let reply="";

  if(state.help>=2){
    reply=
      "يا بُني، التوقف أحيانًا نعمة. دعنا نعدّ القلوب معًا بهدوء.";
  }
  else if(state.wrong>=2){
    reply=
      "الجمع يعني أن نضع الأشياء معًا. انظر، هل القلوب أصبحت أكثر؟";
  }
  else if(state.success>=1){
    reply=
      "أراك تفهم الفكرة. لا نحتاج سرعة، نحتاج هدوءًا فقط.";
  }
  else{
    reply=
      "لا تقلق. فكّر بهدوء، وكل محاولة تُقربك للفهم.";
  }

  helper.style.display="block";
  helper.innerText=reply;
  speak(reply);
}
</script>

</body>
</html>
